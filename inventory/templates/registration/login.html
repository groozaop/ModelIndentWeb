<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Inventory IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: #11111b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(30, 30, 46, 0.9);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .login-brand {
            font-weight: 700;
            font-size: 1.4rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .login-subtitle {
            text-align: center;
            color: #a6adc8;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }
        .form-control {
            background: rgba(17,17,27,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            color: #cdd6f4;
            border-radius: 10px;
            padding: 0.7rem 1rem;
        }
        .form-control:focus {
            background: rgba(17,17,27,0.8);
            border-color: #89b4fa;
            box-shadow: 0 0 0 3px rgba(137,180,250,0.15);
            color: #cdd6f4;
        }
        .form-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-login {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: #fff;
            font-weight: 600;
            padding: 0.7rem;
            border-radius: 10px;
            width: 100%;
            transition: all 0.25s ease;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.35);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand"><i class="bi bi-box-seam me-2"></i>Inventory IMS</div>
        <div class="login-subtitle">Institutional Inventory & Demand Management</div>

        {% if form.errors %}
        <div class="alert alert-danger" style="border-radius: 10px; font-size: 0.85rem;">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <input type="text" name="username" id="id_username" class="form-control"
                       placeholder="Enter your username" autofocus required>
            </div>
            <div class="mb-3">
                <label for="id_password" class="form-label">Password</label>
                <input type="password" name="password" id="id_password" class="form-control"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-login mt-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: #a6adc8;">
            Access restricted to authorized personnel only. 
            <br>Contact the administrator for account creation.
        </div>
    </div>
</body>
</html>

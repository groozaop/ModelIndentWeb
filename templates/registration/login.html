<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Inventory IMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-dark: #0f172a;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --text-main: #f8fafc;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .login-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            font-size: 3rem;
            background: linear-gradient(135deg, #818cf8, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        h2 { font-weight: 700; letter-spacing: -0.025em; }

        .form-label { font-weight: 500; font-size: 0.9rem; color: #94a3b8; }

        .form-control {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 10px;
            transition: all 0.3s;
        }

        .form-control:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            color: white;
        }

        .btn-login {
            background: var(--accent);
            border: none;
            padding: 0.8rem;
            font-weight: 600;
            border-radius: 10px;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        .alert-auth {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .footer-links {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .footer-links a { color: var(--accent); text-decoration: none; }
        .footer-links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-section">
            <i class="bi bi-box-seam-fill logo-icon"></i>
            <h2>Sign In</h2>
            <p class="text-secondary mb-1">Inventory & Demand Management</p>
            <div class="d-flex justify-content-center align-items-center gap-2 mt-2" style="font-size: 0.75rem; color: #10b981;">
                <i class="bi bi-shield-check"></i>
                <span>Secure SSL Encryption Active</span>
            </div>
        </div>

        {% if form.errors %}
        <div class="alert-auth">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Incorrect username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-opacity-10" style="border-radius: 10px 0 0 10px; border-color: rgba(255,255,255,0.1);">
                        <i class="bi bi-person text-secondary"></i>
                    </span>
                    <input type="text" name="username" id="id_username" class="form-control border-start-0" required autofocus placeholder="Username" style="border-radius: 0 10px 10px 0;">
                </div>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label">Password</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0 border-opacity-10" style="border-radius: 10px 0 0 10px; border-color: rgba(255,255,255,0.1);">
                        <i class="bi bi-lock text-secondary"></i>
                    </span>
                    <input type="password" name="password" id="id_password" class="form-control border-start-0" required placeholder="••••••••" style="border-radius: 0 10px 10px 0;">
                </div>
            </div>
            <button type="submit" class="btn btn-login w-100 btn-primary">
                Secure Login <i class="bi bi-shield-lock-fill ms-2"></i>
            </button>
        </form>

        <div class="footer-links">
            <div class="mb-2">
                <i class="bi bi-info-circle me-1"></i> Authorized Personnel Only
            </div>
            Don't have an account? <a href="{% url 'inventory:register' %}">Create Profile</a>
        </div>
    </div>
</body>
</html>
